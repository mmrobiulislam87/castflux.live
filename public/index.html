<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CastFlux Live — বাংলা & বিশ্ব</title>
  <meta name="description" content="CastFlux Live — free live TV. Football, Cricket, Bangla & world channels." />
  <meta property="og:title" content="CastFlux Live" />
  <meta property="og:description" content="Watch live TV instantly — sports, news, Bangla & more." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect fill='%23e85d04' width='32' height='32' rx='6'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-family='sans-serif'%3E%E2%96%B6%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css?v=7" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
</head>
<body>
  <div class="bg-blur" id="bgBlur"></div>

  <div class="shell">
    <section class="player-panel">
      <div class="player-frame" id="playerFrame">
        <div class="ambient-glow" id="ambientGlow" aria-hidden="true"></div>
        <video id="videoPlayer" controls playsinline webkit-playsinline x-webkit-airplay="allow" autoplay muted preload="auto"></video>

        <div class="player-overlay" id="playerOverlay">
          <div class="overlay-msg">
            <div class="play-icon"></div>
            <p>⚡ লাইভ চ্যানেল লোড হচ্ছে...</p>
          </div>
        </div>

        <div class="gesture-hint" id="gestureHint" aria-hidden="true"></div>
        <div class="player-status" id="playerStatus"></div>
        <div class="quality-badge" id="qualityBadge"></div>

        <div class="player-toolbar">
          <button type="button" class="pt-btn" id="favoriteBtn" title="Favorite (S)">☆</button>
          <button type="button" class="pt-btn" id="audioOnlyBtn" title="Audio only">🎧</button>
        </div>
        <button type="button" class="fs-btn" id="fullscreenBtn" title="Fullscreen" aria-label="Fullscreen">⛶</button>

        <div class="player-info">
          <span class="live-badge"><i></i> LIVE</span>
          <h1 id="channelName">Live TV</h1>
          <p id="channelDesc">⚡ দ্রুত চ্যানেল চালু হচ্ছে...</p>
        </div>
      </div>
    </section>

    <aside class="guide-panel">
      <div class="guide-carousel-wrap">
        <button type="button" class="carousel-arrow" id="carouselPrev" aria-label="Previous">‹</button>
        <nav class="guide-tabs" id="guideTabs"></nav>
        <button type="button" class="carousel-arrow" id="carouselNext" aria-label="Next">›</button>
      </div>

      <div class="guide-search">
        <input type="search" id="searchInput" placeholder="চ্যানেল খুঁজুন..." autocomplete="off" />
      </div>

      <div class="guide-toolbar">
        <button type="button" class="toolbar-btn" id="surpriseBtn" title="Random channel">🎲 Surprise Me</button>
        <button type="button" class="toolbar-btn" id="favoritesTabBtn" title="My favorites">★ Favorites</button>
      </div>

      <div class="channel-grid" id="channelList"></div>

      <footer class="guide-footer">
        <span class="channel-count" id="railCount"></span>
        <div class="footer-actions">
          <button type="button" class="foot-btn" id="syncBtn" title="GitHub Sync">⟳</button>
          <button type="button" class="foot-btn" id="settingsBtn" title="Settings">⚙</button>
        </div>
      </footer>

      <div class="settings-drawer" id="settingsPanel">
        <label>Buffer mode
          <select id="bandwidthMode">
            <option value="auto">Smooth (Recommended)</option>
            <option value="medium">Standard</option>
            <option value="low">Data Saver</option>
          </select>
        </label>
        <label>Resolution
          <select id="manualQuality">
            <option value="-1">Auto</option>
          </select>
        </label>
        <label class="toggle-row">
          <span>Ambient glow</span>
          <input type="checkbox" id="ambientToggle" checked />
        </label>
        <label class="toggle-row">
          <span>Audio-only mode</span>
          <input type="checkbox" id="audioOnlyToggle" />
        </label>
        <p class="settings-hint">⌨️ ↑↓ volume · ←→ channel · F fullscreen · M mute · S favorite</p>
        <button type="button" class="drawer-btn" id="adminToggle">+ Add Channel</button>
      </div>
    </aside>
  </div>

  <dialog id="addChannelModal" class="modal">
    <form id="addChannelForm" method="dialog">
      <h3>চ্যানেল যোগ করুন</h3>
      <label>নাম *<input name="name" required /></label>
      <label>Stream URL (.m3u8) *<input name="stream_url" required /></label>
      <label>Backup URL<input name="backup_url" /></label>
      <div class="form-row">
        <label>Group
          <select name="lang_group">
            <option>Football</option><option>Cricket</option><option>Sports</option>
            <option>Kids</option><option>Bangla</option><option>English</option>
            <option>Hindi</option><option>Islamic</option>
          </select>
        </label>
        <label>Country<input name="country" placeholder="BD" maxlength="3" /></label>
      </div>
      <label>Logo URL<input name="logo_url" /></label>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" id="cancelAdd">বাতিল</button>
        <button type="submit" class="btn-save">সংরক্ষণ</button>
      </div>
    </form>
  </dialog>

  <script src="/js/app.js?v=8"></script>
</body>
</html>
